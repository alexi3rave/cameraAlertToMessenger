# Только ../env/app.env — docker compose должен читать файл от вашего пользователя.
# Секреты (POSTGRES_PASSWORD и т.д.) храните в app.env (chmod 600) или скопируйте из .env вручную.
# Файл .env в compose не подключаем — иначе при root-only правах будет permission denied.

services:

  postgres:
    image: postgres:16
    container_name: camera-v2-postgres
    restart: unless-stopped
    env_file:
      - ../env/app.env
    volumes:
      - ../state/postgres:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camera -d camera_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

  watcher:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: camera-v2-watcher
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ../env/app.env
    environment:
      WATCH_USE_MTIME_CURSOR: "1"
      WATCH_MAX_FILE_AGE_SECONDS: "3600"
      WATCH_FILE_STABILIZE_SECONDS: "0.2"
      WATCH_LOOP_SLEEP_SECONDS: "1"
      WATCH_INITIAL_LOOKBACK_SECONDS: "300"
      TEST_FILE_REGEX: "\\.txt$"
      EVENT_JOURNAL_DIR: "/events"
    volumes:
      - ${FTP_SOURCE_PATH:-/home/alex/camera-system/ftp-uploads}:/source:ro
      - ../logs/watcher:/logs
      - ../logs/events:/events
      - ../state/watcher:/state
    depends_on:
      - postgres
    command: ["python", "-u", "watcher.py"]

  processor:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: camera-v2-processor
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ../env/app.env
    environment:
      PROCESSOR_IDLE_SLEEP_SECONDS: "1"
      MAX_API_BASE: "https://platform-api.max.ru"
      POSTGRES_HOST: "${POSTGRES_HOST:-cf1faf585fc8_camera-v2-postgres}"
      TEST_FILE_REGEX: "\\.txt$"
      EVENT_JOURNAL_DIR: "/events"
    volumes:
      - ${FTP_SOURCE_PATH:-/home/alex/camera-system/ftp-uploads}:/source:ro
      - ../logs/processor:/logs
      - ../logs/events:/events
    depends_on:
      - postgres
    command: ["python", "-u", "processor.py"]

  processor2:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: camera-v2-processor-2
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ../env/app.env
    environment:
      PROCESSOR_IDLE_SLEEP_SECONDS: "1"
      MAX_API_BASE: "https://platform-api.max.ru"
      POSTGRES_HOST: "${POSTGRES_HOST:-cf1faf585fc8_camera-v2-postgres}"
      TEST_FILE_REGEX: "\\.txt$"
      EVENT_JOURNAL_DIR: "/events"
      PROCESSOR_WORKER_ID: "processor-2"
    volumes:
      - ${FTP_SOURCE_PATH:-/home/alex/camera-system/ftp-uploads}:/source:ro
      - ../logs/processor:/logs
      - ../logs/events:/events
    depends_on:
      - postgres
    command: ["python", "-u", "processor.py"]

  retry:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: camera-v2-retry
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ../env/app.env
    volumes:
      - ../logs/retry:/logs
    depends_on:
      - postgres
    command: ["python", "-u", "retry_worker.py"]

  ftp_cleanup:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: camera-v2-ftp-cleanup
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ../env/app.env
    environment:
      EVENT_JOURNAL_DIR: "/events"
      FTP_CLEANUP_LOG_DIR: "/logs"
    volumes:
      - ${FTP_SOURCE_PATH:-/home/alex/camera-system/ftp-uploads}:/source
      - ../logs/ftp_cleanup:/logs
      - ../logs/events:/events
    depends_on:
      - postgres
    command: ["python", "-u", "ftp_cleanup_worker.py"]
