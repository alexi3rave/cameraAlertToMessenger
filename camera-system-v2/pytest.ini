[tool:pytest]
# pytest configuration

# Test discovery
testpaths = tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Paths
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Coverage (enabled via run script)
# --cov=app
# --cov-report=term-missing
# --cov-report=html:reports/unit/htmlcov
# --cov-report=xml:reports/unit/coverage.xml

# HTML Report
# --html=reports/unit/report.html
# --self-contained-html

# JUnit XML for CI
# --junitxml=reports/unit/junit.xml

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests (default)

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Environment variables for tests
env =
    PYTHONPATH=app
    FTP_CLEANUP_ROOT=/tmp/test_ftp
    FTP_RETENTION_DAYS=7
    FTP_QUARANTINE_RETENTION_DAYS=3
    FTP_CLEANUP_INTERVAL_SEC=1
    FTP_CLEANUP_BATCH=10
    FTP_CLEANUP_LOG_DIR=/tmp/test_logs
